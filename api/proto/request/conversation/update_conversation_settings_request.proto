syntax = "proto3";

package im.turms.proto;

import "model/common/value.proto";

option java_package = "im.turms.server.common.access.client.dto.request.conversation";
option java_multiple_files = true;
option go_package = "im.turms/server/pkg/protocol";

message UpdateConversationSettingsRequest {
    optional int64 user_id = 1;
    optional int64 group_id = 2;
    map<string, Value> settings = 3;
    repeated Value custom_attributes = 15;
}
